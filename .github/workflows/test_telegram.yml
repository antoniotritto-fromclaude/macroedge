# .github/workflows/test_telegram.yml
# ================================================================
# MacroEdge — Test rapido Telegram
# ================================================================

name: MacroEdge — Test Telegram

on:
  workflow_dispatch:
    inputs:
      tipo:
        description: "Tipo di messaggio"
        required: true
        default: "status"
        type: choice
        options:
          - "status"
          - "sample"
          - "alert"
      messaggio:
        description: "Messaggio personalizzato (solo se tipo = status)"
        required: false
        default: ""
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test_telegram:
    name: "Invia messaggio di test su Telegram"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installa dipendenze minime
        run: pip install python-telegram-bot python-dotenv

      - name: Crea cartella logs
        run: mkdir -p logs

      # ── Verifica secrets prima di procedere ──────────────────
      - name: Verifica secrets Telegram
        run: |
          if [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "❌ ERRORE: Secret TELEGRAM_BOT_TOKEN non configurato!"
            echo ""
            echo "Come configurarlo:"
            echo "  1. Vai su GitHub → repo → Settings → Secrets and variables → Actions"
            echo "  2. Clicca 'New repository secret'"
            echo "  3. Name: TELEGRAM_BOT_TOKEN  |  Value: il token del tuo bot (da @BotFather)"
            echo "  4. Fai lo stesso per TELEGRAM_CHAT_ID (ID del canale, es. -100XXXXXXXXX)"
            exit 1
          fi
          if [ -z "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "❌ ERRORE: Secret TELEGRAM_CHAT_ID non configurato!"
            echo ""
            echo "Come trovare il Chat ID:"
            echo "  1. Manda un messaggio nel tuo canale Telegram"
            echo "  2. Visita: https://api.telegram.org/bot<TOKEN>/getUpdates"
            echo "  3. Cerca: \"chat\":{\"id\": -100XXXXXXXXX}"
            exit 1
          fi
          echo "✅ Secrets configurati correttamente"

      - name: Invia test — stato sistema
        if: ${{ inputs.tipo == 'status' && inputs.messaggio == '' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python test_telegram.py

      - name: Invia test — messaggio personalizzato
        if: ${{ inputs.tipo == 'status' && inputs.messaggio != '' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python test_telegram.py --msg "${{ inputs.messaggio }}"

      - name: Invia test — report di esempio
        if: ${{ inputs.tipo == 'sample' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python test_telegram.py --sample

      - name: Invia test — alert dollaro
        if: ${{ inputs.tipo == 'alert' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python test_telegram.py --alert
