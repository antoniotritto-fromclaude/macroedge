# .github/workflows/macroedge.yml
# ================================================================
# MacroEdge — automazione completa su GitHub Actions
#
# DUE JOB SETTIMANALI:
#   • Lunedì   06:00 UTC (07:00 CET / 08:00 CEST) → Ciclo A
#   • Giovedì  06:00 UTC (07:00 CET / 08:00 CEST) → Ciclo B
#
# Ogni job fa tutto in un'unica esecuzione:
#   1. Scarica prezzi da Yahoo Finance
#   2. Legge i feed RSS
#   3. Chiama l'AI per l'analisi
#   4. Invia il report su Telegram
#   5. Salva su Notion
#   6. Salva il report JSON come artifact GitHub
#
# SECRETS DA CONFIGURARE in GitHub → Settings → Secrets → Actions:
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID
#   NOTION_API_KEY
#   NOTION_PARENT_PAGE_ID
#   NOTION_DB_REPORTS
#   NOTION_DB_TECNICA
#   NOTION_DB_NEWS
#   AI_PROVIDER          (groq | gemini | mistral | anthropic)
#   GROQ_API_KEY         (se usi Groq)
#   GEMINI_API_KEY       (se usi Gemini)
#   MISTRAL_API_KEY      (se usi Mistral)
#   ANTHROPIC_API_KEY    (se usi Anthropic)
# ================================================================

name: MacroEdge — Report Automatico

on:
  schedule:
    # Lunedì 06:00 UTC → Ciclo A (report pre-apertura settimana)
    - cron: "0 6 * * 1"
    # Giovedì 06:00 UTC → Ciclo B (aggiornamento infrasettimanale)
    - cron: "0 6 * * 4"

  # Permetti esecuzione manuale dal tab Actions di GitHub
  workflow_dispatch:
    inputs:
      cycle:
        description: "Ciclo da eseguire"
        required: true
        default: "A"
        type: choice
        options:
          - "A"
          - "B"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macroedge_report:
    name: "Genera e invia report MacroEdge"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Se attivato da schedule, controlla la variabile SCHEDULE_ACTIVE.
    # I run manuali (workflow_dispatch) partono sempre.
    if: github.event_name == 'workflow_dispatch' || vars.SCHEDULE_ACTIVE != 'false'

    steps:
      # ── 1. Checkout ───────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Python 3.11 ─────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Installa dipendenze ────────────────────────────────
      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Crea la cartella logs ──────────────────────────────
      - name: Crea cartella logs
        run: mkdir -p logs

      # ── 5. Determina il ciclo (schedule o manuale) ────────────
      - name: Determina ciclo
        id: cycle
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "CYCLE=${{ inputs.cycle }}" >> $GITHUB_ENV
          else
            DAY=$(date +%u)   # 1=lunedì, 4=giovedì
            if [ "$DAY" = "1" ]; then
              echo "CYCLE=A" >> $GITHUB_ENV
            else
              echo "CYCLE=B" >> $GITHUB_ENV
            fi
          fi

      # ── 6. Esegui MacroEdge ───────────────────────────────────
      - name: Esegui analisi MacroEdge
        env:
          AI_PROVIDER:           ${{ secrets.AI_PROVIDER }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY:       ${{ secrets.MISTRAL_API_KEY }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTION_API_KEY:        ${{ secrets.NOTION_API_KEY }}
          NOTION_DB_REPORTS:     ${{ secrets.NOTION_DB_REPORTS }}
          NOTION_DB_TECNICA:     ${{ secrets.NOTION_DB_TECNICA }}
          NOTION_DB_NEWS:        ${{ secrets.NOTION_DB_NEWS }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
        run: python main.py --run-now ${{ env.CYCLE }}

      # ── 7. Salva report JSON come artifact ────────────────────
      - name: Salva report come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macroedge-report-${{ env.CYCLE }}-${{ github.run_id }}
          path: logs/report_*.json
          retention-days: 90
          if-no-files-found: warn

      # ── 8. Salva log di sistema ───────────────────────────────
      - name: Salva log come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macroedge-log-${{ env.CYCLE }}-${{ github.run_id }}
          path: logs/*.log
          retention-days: 30
          if-no-files-found: ignore

      # ── 9. Notifica Telegram in caso di errore ────────────────
      - name: Notifica errore su Telegram
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import asyncio, os
          from telegram import Bot
          async def send():
              bot = Bot(token=os.environ['TELEGRAM_BOT_TOKEN'])
              await bot.send_message(
                  chat_id=os.environ['TELEGRAM_CHAT_ID'],
                  text='🚨 *MacroEdge — ERRORE*\nIl workflow GitHub Actions è fallito\.\nCiclo: ${{ env.CYCLE }}\nRun ID: ${{ github.run_id }}\nControlla i log su GitHub Actions\.',
                  parse_mode='MarkdownV2'
              )
          asyncio.run(send())
          "
