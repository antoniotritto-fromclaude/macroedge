# .github/workflows/macroedge.yml
# ================================================================
# MacroEdge — automazione completa su GitHub Actions
#
# DUE JOB SETTIMANALI:
#   • Lunedì   06:00 UTC (07:00 CET / 08:00 CEST) → Ciclo A
#   • Giovedì  06:00 UTC (07:00 CET / 08:00 CEST) → Ciclo B
#
# Ogni job fa tutto in un'unica esecuzione:
#   1. Scarica prezzi da Yahoo Finance
#   2. Legge i feed RSS (ultime 60h per lunedì, 36h per giovedì)
#   3. Chiama Claude AI per l'analisi
#   4. Invia il report su Telegram
#   5. Salva su Google Sheets
#   6. Salva il report JSON come artifact GitHub (storico)
#
# SECRETS DA CONFIGURARE in GitHub → Settings → Secrets → Actions:
#   ANTHROPIC_API_KEY
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID
#   GOOGLE_SHEET_ID
#   NOTION_API_KEY   (contenuto del file credentials.json, tutto su una riga)
# ================================================================

name: MacroEdge — Report Automatico

on:
  schedule:
    # Lunedì 06:00 UTC → Ciclo A (report pre-apertura settimana)
    - cron: "0 6 * * 1"
    # Giovedì 06:00 UTC → Ciclo B (aggiornamento infrasettimanale)
    - cron: "0 6 * * 4"

  # Permetti esecuzione manuale dal tab Actions di GitHub
  workflow_dispatch:
    inputs:
      cycle:
        description: "Ciclo da eseguire"
        required: true
        default: "A"
        type: choice
        options:
          - "A"
          - "B"
      dry_run:
        description: "Dry run (non invia su Telegram)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  macroedge_report:
    name: "Genera e invia report MacroEdge"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout del repository ────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Python 3.11 ─────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Installa dipendenze ────────────────────────────────
      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Ricostruisce credentials.json da Secret ────────────
      # Il file JSON del service account Google viene salvato come
      # secret GitHub in formato stringa. Qui lo scriviamo su disco.
      - name: Prepara credenziali Google
        run: |
          echo '${{ secrets.NOTION_API_KEY }}' > credentials.json
          echo "Credenziali Google scritte."

      # ── 5. Crea la cartella logs ──────────────────────────────
      - name: Crea cartella logs
        run: mkdir -p logs

      # ── 6. Determina il ciclo (schedule automatica o manuale) ─
      - name: Determina ciclo
        id: cycle
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "CYCLE=${{ inputs.cycle }}" >> $GITHUB_ENV
            echo "DRY_RUN=${{ inputs.dry_run }}" >> $GITHUB_ENV
          else
            DAY=$(date +%u)   # 1=lunedì, 4=giovedì
            if [ "$DAY" = "1" ]; then
              echo "CYCLE=A" >> $GITHUB_ENV
            else
              echo "CYCLE=B" >> $GITHUB_ENV
            fi
            echo "DRY_RUN=false" >> $GITHUB_ENV
          fi
          echo "Ciclo selezionato: $CYCLE"

      # ── 7. Esegui MacroEdge ───────────────────────────────────
      - name: Esegui analisi MacroEdge
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTION_API_KEY:      ${{ secrets.NOTION_API_KEY }}
          NOTION_DB_REPORTS:   ${{ secrets.NOTION_DB_REPORTS }}
          NOTION_DB_TECNICA:   ${{ secrets.NOTION_DB_TECNICA }}
          NOTION_DB_NEWS:      ${{ secrets.NOTION_DB_NEWS }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          DRY_RUN: ${{ env.DRY_RUN }}
        run: |
          python main.py --run-now ${{ env.CYCLE }}

      # ── 8. Salva report JSON come artifact ────────────────────
      # Conserva tutti i report generati per 90 giorni
      - name: Salva report come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macroedge-report-${{ env.CYCLE }}-${{ github.run_id }}
          path: logs/report_*.json
          retention-days: 90
          if-no-files-found: warn

      # ── 9. Salva log di sistema ───────────────────────────────
      - name: Salva log come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macroedge-log-${{ env.CYCLE }}-${{ github.run_id }}
          path: logs/*.log
          retention-days: 30
          if-no-files-found: ignore

      # ── 10. Notifica Telegram in caso di errore ───────────────
      - name: Notifica errore su Telegram
        if: failure()
        run: |
          python -c "
          import asyncio
          from telegram import Bot
          async def send():
              bot = Bot(token='${{ secrets.TELEGRAM_BOT_TOKEN }}')
              await bot.send_message(
                  chat_id='${{ secrets.TELEGRAM_CHAT_ID }}',
                  text='🚨 *MacroEdge — ERRORE*\nIl workflow GitHub Actions è fallito\.\nCiclo: ${{ env.CYCLE }}\nRun ID: ${{ github.run_id }}\nControlla i log su GitHub Actions\.',
                  parse_mode='MarkdownV2'
              )
          asyncio.run(send())
          "
